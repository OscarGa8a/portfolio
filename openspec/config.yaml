schema: spec-driven

context: |
  Tech stack: Astro 6.4.7 (ESM, type:module), Node >=22.12.0, TypeScript strict via astro/tsconfigs/strict.
  Package manager: pnpm (pnpm-lock.yaml + pnpm-workspace.yaml with allowBuilds: esbuild, sharp).
  Architecture: Astro pages + layouts + components. Default scaffold currently in src/; source-of-truth design lives in docs/index.html (Spanish+English bilingual dark portfolio, 829 lines).
  Testing: NONE detected — no vitest, jest, playwright, cypress, eslint, prettier, or biome configured.
  Style: Component-first Astro with scoped <style> blocks; bilingual (es/en) copy expected.
  Public assets: /favicon.svg, /favicon.ico; src/assets/ contains astro.svg and background.svg.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Call out migration of docs/index.html design intent into Astro components
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Treat docs/index.html as the visual/behavioral spec for the portfolio domain
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Map docs/index.html sections to Astro component breakdown
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Mark strict TDD per task: most are content/component tasks (non-TDD), gate by `astro check` + visual diff
  apply:
    tdd: false
    test_command: "npx astro check"
    build_command: "npm run build"
    rules:
      - Follow existing Astro project structure (src/pages, src/layouts, src/components, src/assets)
      - Preserve bilingual es/en copy from docs/index.html
      - Keep the default scaffold until the first sdd-propose lands a porting plan
  verify:
    test_command: "npx astro check"
    build_command: "npm run build"
    coverage_threshold: 0
    visual_check: "diff docs/index.html vs rendered src/pages/index.astro"
  archive:
    - Warn before merging destructive deltas
    - Preserve docs/index.html as historical source-of-truth

testing:
  strict_tdd: false
  reason: "No test runner, linter, formatter, or coverage tool configured. Falls back to no-runner default (per sdd-init decision gate)."
  runner:
    unit: null
    integration: null
    e2e: null
  quality:
    type_checker: "npx astro check"
    linter: null
    formatter: null
  coverage:
    available: false
    command: null
